<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ide Rancangan & Konsep Sistem - Project Magang</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mermaid/10.9.1/mermaid.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body { font-family: 'Segoe UI', sans-serif; background-color: #f8fafc; padding: 20px; margin: 0; color: #333; }
    h1 { text-align: center; margin-bottom: 10px; color: #1e293b; }
    p.subtitle { text-align: center; color: #64748b; margin-bottom: 40px; }
    
    .section { 
      background: white; 
      padding: 30px; 
      border-radius: 16px; 
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06); 
      margin-bottom: 40px; 
    }
    
    h2 { 
      border-bottom: 2px solid #e2e8f0; 
      padding-bottom: 15px; 
      margin-bottom: 20px; 
      color: #334155; 
      font-size: 1.5rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .controls { margin-bottom: 20px; display: flex; gap: 10px; }
    
    button { 
      padding: 10px 20px; 
      background-color: #2563eb; 
      color: white; 
      border: none; 
      border-radius: 8px; 
      cursor: pointer; 
      font-weight: 600; 
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    button:hover { background-color: #1d4ed8; }
    
    .diagram-container { 
      overflow: auto; 
      display: flex; 
      justify-content: center; 
      min-height: 400px;
      padding: 20px;
      background: #fff;
      border: 1px solid #f1f5f9;
      border-radius: 8px;
    }
    
    .error-log { color: #ef4444; background: #fee2e2; padding: 10px; border-radius: 8px; display: none; margin-bottom: 15px; }
  </style>
</head>
<body>
  <h1>Ide Rancangan Sistem Monitoring Visual & Sales</h1>
  <p class="subtitle">Visualisasi Konsep, Masalah, Solusi, dan Arsitektur Sistem</p>

  <!-- 1. MIND MAP (KONSEP) -->
  <div class="section">
    <h2><i class="fas fa-brain"></i> 1. Peta Konsep (Mind Map)</h2>
    <div id="err-mindmap" class="error-log"></div>
    <div class="controls">
      <button onclick="downloadPNG('mindmap-div', 'Konsep_MindMap.png')"><i class="fas fa-download"></i> Download Mind Map PNG</button>
    </div>
    <div class="diagram-container" id="mindmap-div"></div>
  </div>

  <!-- 2. ARSITEKTUR SISTEM (High Level) -->
  <div class="section">
    <h2><i class="fas fa-sitemap"></i> 2. Arsitektur Sistem (Context Diagram)</h2>
    <div id="err-context" class="error-log"></div>
    <div class="controls">
      <button onclick="downloadPNG('context-div', 'Arsitektur_Sistem.png')"><i class="fas fa-download"></i> Download Arsitektur PNG</button>
    </div>
    <div class="diagram-container" id="context-div"></div>
  </div>

  <script>
    // --- DEFINISI DIAGRAM ---

    // 1. Mind Map (Menggunakan sintaks Mermaid Mindmap)
    // Note: Mermaid mindmap sangat sensitif terhadap indentasi
    const mindmapDef = `
mindmap
  root((Sistem Monitoring<br/>Visual & Sales))
    Masalah Utama
      Monitoring Manual
      Laporan Lambat
      Lokasi Tidak Valid
      Data Bias
    Solusi & Fitur
      Tracking GPS Realtime
      Bukti Foto Visual
      Dashboard Analitik
      Manajemen Tugas
      Absensi Digital
    Pengguna
      Manager Supervisor
      Officer Admin
      Sales Lapangan
    Manfaat Bisnis
      Efisiensi Waktu
      Transparansi Data
      Peningkatan Omzet
      Evaluasi Objektif
    `;

    // 2. Context Diagram (C4 Style sederhana menggunakan Flowchart)
    const contextDef = `
    flowchart TD
      subgraph Users [Pengguna Sistem]
        MG[Manager]:::person
        OF[Officer]:::person
        AR[Sales/AR]:::person
      end

      subgraph System [Platform SIMVIS]
        WebApp[Web Dashboard]:::sys
        MobileApp[Mobile App]:::sys
        API[Backend API]:::sys
        DB[(Database)]:::db
      end

      subgraph External [Layanan Eksternal]
        Maps[Google/Leaflet Maps]:::ext
        Auth[Auth System]:::ext
      end

      MG -- Monitoring & Approval --> WebApp
      OF -- Kelola Tugas & User --> WebApp
      AR -- Laporan & Absensi --> MobileApp

      WebApp -- Request Data --> API
      MobileApp -- Kirim Data/Foto --> API

      API -- CRUD Data --> DB
      WebApp -- Load Peta --> Maps
      MobileApp -- Get Location --> Maps
      API -- Verifikasi --> Auth

      %% Styling
      classDef person fill:#e0f2fe,stroke:#0369a1,stroke-width:2px,color:#0369a1,font-weight:bold
      classDef sys fill:#f0fdf4,stroke:#15803d,stroke-width:2px,color:#15803d,font-weight:bold
      classDef db fill:#fefce8,stroke:#ca8a04,stroke-width:2px,color:#ca8a04
      classDef ext fill:#f3f4f6,stroke:#4b5563,stroke-width:2px,stroke-dasharray: 5 5,color:#4b5563
      
      linkStyle default stroke-width:2px,stroke:#64748b
    `;

    // --- RENDER ENGINE ---
    document.addEventListener('DOMContentLoaded', function() {
      mermaid.initialize({ 
        startOnLoad: false, 
        theme: 'base',
        securityLevel: 'loose',
        mindmap: { useMaxWidth: false },
        flowchart: { htmlLabels: true, curve: 'basis' }
      });

      renderDiagram('mindmap-div', mindmapDef, 'err-mindmap');
      renderDiagram('context-div', contextDef, 'err-context');
    });

    function renderDiagram(id, def, errId) {
      const element = document.getElementById(id);
      // Generate ID unik untuk SVG
      const svgId = id + '-svg-' + Math.floor(Math.random() * 10000);
      
      mermaid.render(svgId, def).then((result) => {
        element.innerHTML = result.svg;
        const svg = element.querySelector('svg');
        if(svg) {
          svg.style.maxWidth = '100%';
          svg.style.height = 'auto';
          svg.style.fontFamily = 'Segoe UI, sans-serif';
        }
      }).catch(err => {
        console.error(err);
        document.getElementById(errId).style.display = 'block';
        document.getElementById(errId).innerText = "Error Render: " + err.message;
        // Fallback jika mindmap gagal (karena versi mermaid)
        if(id === 'mindmap-div') {
             element.innerHTML = '<p style="text-align:center;color:red">Browser Anda mungkin belum mendukung fitur Mindmap Mermaid terbaru. Silakan gunakan Chrome/Edge terbaru.</p>';
        }
      });
    }

    function downloadPNG(divId, filename) {
      const div = document.getElementById(divId);
      const svg = div.querySelector('svg');
      if (!svg) { alert('Diagram belum siap'); return; }
      
      // Get SVG Data
      const serializer = new XMLSerializer();
      let source = serializer.serializeToString(svg);

      // Add XML namespaces if missing
      if (!source.match(/^<svg[^>]+xmlns="http\:\/\/www\.w3\.org\/2000\/svg"/)) {
        source = source.replace(/^<svg/, '<svg xmlns="http://www.w3.org/2000/svg"');
      }
      if (!source.match(/^<svg[^>]+xmlns:xlink/)) {
        source = source.replace(/^<svg/, '<svg xmlns:xlink="http://www.w3.org/1999/xlink"');
      }

      const svgBlob = new Blob([source], {
        type: "image/svg+xml;charset=utf-8",
      });
      const url = URL.createObjectURL(svgBlob);

      const img = new Image();
      img.onload = function() {
        const canvas = document.createElement('canvas');
        const scale = 4; // High Resolution
        const rect = svg.getBoundingClientRect();
        
        // Fallback if size is 0 (e.g. hidden element), use default 800x600
        const width = (rect.width > 0 ? rect.width : 800) * scale;
        const height = (rect.height > 0 ? rect.height : 600) * scale;
        
        canvas.width = width;
        canvas.height = height;
        
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = 'white';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Draw image
        ctx.drawImage(img, 0, 0, width, height);
        
        const a = document.createElement('a');
        a.download = filename;
        a.href = canvas.toDataURL('image/png');
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        
        URL.revokeObjectURL(url);
      };
      
      img.onerror = function() { 
          alert("Gagal konversi ke PNG. Pastikan tidak ada karakter aneh di diagram."); 
      };
      
      img.src = url;
    }
  </script>
</body>
</html>
